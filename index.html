<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Board-Office Status</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <header class="header">
      <div>
        <h1>Board-Office Status</h1>
        <p id="lastUpdated"></p>
      </div>
      <div id="upcoming" class="upcoming"></div>
    </header>

    <section class="card">
      <h2>Portal</h2>
      <div id="portalTable"></div>
    </section>

    <section class="card">
      <h2>Hub</h2>
      <div id="hubTable"></div>
    </section>

    <section class="card">
      <h2>Questions & Stoppers</h2>
      <ol id="dependenciesList" class="dependency-list"></ol>
    </section>
  </main>

  <script>
    fetch("data.json")
      .then(response => response.json())
      .then(data => {
        window.statusConfig = data.statusConfig;
        document.getElementById("lastUpdated").textContent =
          `Last updated: ${data.lastUpdated}`;

        document.getElementById("upcoming").innerHTML =
          data.upcomingDeliveries.map(item => `
            <div class="delivery">
              <span>${item.scope} upcoming delivery</span>
              <strong>${item.delivery}</strong>
            </div>
          `).join("");

        renderTable("portalTable", data.portal);
        renderTable("hubTable", data.hub);
        renderDependencies(data.dependencies);
      });
    function renderTable(elementId, items) {
      document.getElementById(elementId).innerHTML = `
        <table>
          <thead>
            <tr>
              <th class="number-col">#</th>
              <th>Priority</th>
              <th>Status</th>
              <th>Stage delivery</th>
              <th>Production delivery</th>
            </tr>
          </thead>
          <tbody>
            ${items.map((item, index) => `
              <tr>
                <td class="number-col">${index + 1}</td>
                <td class="priority-cell">${item.name}</td>
                <td><span class="badge ${window.statusConfig[item.status] || 'todo'}">${item.status}</span></td>
                <td class="delivery-cell">${item.stageEta}</td>
                <td class="delivery-cell">${item.prodEta}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function renderDependencies(items) {
      document.getElementById("dependenciesList").innerHTML = items.map(item => {
        const typeClass = item.type === "Blocker" ? "stopped" : "awaiting-feedback";
        return `
          <li>
            <div>
              <strong>${item.item}</strong>
              <p>${item.status}</p>
            </div>
            <span class="badge ${typeClass}">${item.type}</span>
          </li>
        `;
      }).join("");
    }
  </script>
</body>
</html>
