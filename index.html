<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Status</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <aside class="quick-access" aria-label="Quick access">
      <h2>Quick Access</h2>
      <nav>
        <a href="#portalSection">Portal <span id="qaPortalCount" class="qa-count">(0)</span></a>
        <a href="#hubSection">Hub <span id="qaHubCount" class="qa-count">(0)</span></a>
        <a href="#questionsSection">Questions &amp; Stoppers</a>
      </nav>
    </aside>

    <div class="content-column">
      <header class="header">
        <div>
          <h1>Project Status</h1>
          <p id="lastUpdated"></p>
        </div>
        <div id="upcoming" class="upcoming"></div>
      </header>

      <section class="card" id="portalSection">
        <button class="section-toggle" onclick="toggleSection('portalSection')">
          <span id="portalTitle">Portal</span>
          <span class="toggle-action">Hide</span>
        </button>
        <div class="section-content">
          <div id="portalTable"></div>
        </div>
      </section>

      <section class="card" id="hubSection">
        <button class="section-toggle" onclick="toggleSection('hubSection')">
          <span id="hubTitle">Hub</span>
          <span class="toggle-action">Hide</span>
        </button>
        <div class="section-content">
          <div id="hubTable"></div>
        </div>
      </section>

      <section class="card" id="questionsSection">
        <button class="section-toggle" onclick="toggleSection('questionsSection')">
          <span id="questionsTitle">Questions & Stoppers</span>
          <span class="toggle-action">Hide</span>
        </button>
        <div class="section-content">
          <div id="questionsAndStoppersTable"></div>
        </div>
      </section>
    </div>
  </main>

  <script>
    // Status sort priority: lower number = higher in list
    const STATUS_ORDER = {
      "In progress": 1,
      "In QA": 2,
      "Awaiting feedback": 3,
      "To Do": 4,
      "Done": 5,
      "Stopped": 6
    };

    // Sort state per table: { col: 'status'|'name'|'stageEta'|'prodEta', dir: 'asc'|'desc' }
    const sortState = {
      portalTable: { col: "status", dir: "asc" },
      hubTable: { col: "status", dir: "asc" }
    };

    let globalData = null;

    fetch(`data.json?v=${Date.now()}`)
      .then(response => response.json())
      .then(data => {
        globalData = data;
        document.getElementById("lastUpdated").textContent =
          `Last updated: ${data.lastUpdated}`;

        renderUpcoming(data.upcomingDeliveries || []);

        updateSectionTitle("portalTitle", "Portal", data.portal || []);
        updateSectionTitle("hubTitle", "Hub", data.hub || []);
        updateQuestionsTitle(data.questionsAndStoppers || []);
        updateQuickAccess(data.portal || [], data.hub || []);

        renderTable("portalTable", data.portal || [], data);
        renderTable("hubTable", data.hub || [], data);
        renderQuestionsAndStoppers(data.questionsAndStoppers || []);
      })
      .catch(error => {
        console.error("Failed to load data.json", error);
      });

    function renderUpcoming(items) {
      document.getElementById("upcoming").innerHTML = items.map(item => `
        <div class="delivery">
          <span>${item.scope} upcoming delivery</span>
          <strong>${item.delivery}</strong>
        </div>
      `).join("");
    }

    function updateSectionTitle(elementId, label, items) {
      document.getElementById(elementId).textContent = `${label} (${items.length})`;
    }

    function updateQuestionsTitle(items) {
      const stoppers = items.filter(i => i.type === "Stopper" || i.type === "Blocker").length;
      const questions = items.length - stoppers;
      document.getElementById("questionsTitle").textContent =
        `Questions & Stoppers (${items.length}) — ${stoppers} Stoppers / ${questions} Questions`;
    }

    function updateQuickAccess(portalItems, hubItems) {
      document.getElementById("qaPortalCount").textContent = `(${portalItems.length})`;
      document.getElementById("qaHubCount").textContent = `(${hubItems.length})`;
    }

    function toggleSection(sectionId) {
      const section = document.getElementById(sectionId);
      section.classList.toggle("collapsed-section");
      const action = section.querySelector(".toggle-action");
      action.textContent = section.classList.contains("collapsed-section") ? "Show" : "Hide";
    }

    function getStatusClass(status, data) {
      if (!status) return "todo";
      const statusConfig = data.statusConfig || {};
      return statusConfig[status] || "todo";
    }

    function sortItems(items, col, dir) {
      return [...items].sort((a, b) => {
        let valA, valB;
        if (col === "status") {
          valA = STATUS_ORDER[a.status] ?? 99;
          valB = STATUS_ORDER[b.status] ?? 99;
          return dir === "asc" ? valA - valB : valB - valA;
        } else if (col === "name") {
          valA = (a.name || "").toLowerCase();
          valB = (b.name || "").toLowerCase();
        } else if (col === "stageEta") {
          valA = (a.stageEta || "").toLowerCase();
          valB = (b.stageEta || "").toLowerCase();
        } else if (col === "prodEta") {
          valA = (a.prodEta || "").toLowerCase();
          valB = (b.prodEta || "").toLowerCase();
        }
        if (valA < valB) return dir === "asc" ? -1 : 1;
        if (valA > valB) return dir === "asc" ? 1 : -1;
        return 0;
      });
    }

    function sortTable(tableId, col) {
      const state = sortState[tableId];
      if (state.col === col) {
        state.dir = state.dir === "asc" ? "desc" : "asc";
      } else {
        state.col = col;
        state.dir = col === "status" ? "asc" : "asc";
      }
      const sectionKey = tableId === "portalTable" ? "portal" : "hub";
      renderTable(tableId, globalData[sectionKey] || [], globalData);
    }

    function getSortIndicator(tableId, col) {
      const state = sortState[tableId];
      if (state.col !== col) return `<span class="sort-indicator inactive">⇅</span>`;
      return `<span class="sort-indicator">${state.dir === "asc" ? "▲" : "▼"}</span>`;
    }

    function renderTable(elementId, items, data) {
      const state = sortState[elementId];
      const sorted = sortItems(items, state.col, state.dir);

      const rows = sorted.map((item, index) => {
        const badgeClass = getStatusClass(item.status, data);
        return `
          <tr>
            <td class="number-col" data-label="#">${index + 1}</td>
            <td class="priority-cell" data-label="Priority">${item.name}</td>
            <td class="task-status-cell" data-label="Status"><span class="badge ${badgeClass}">${item.status}</span></td>
            <td class="delivery-cell task-stage-cell" data-label="Stage delivery">${item.stageEta}</td>
            <td class="delivery-cell task-prod-cell" data-label="Production delivery">${item.prodEta}</td>
          </tr>
        `;
      }).join("");

      document.getElementById(elementId).innerHTML = `
        <table>
          <thead>
            <tr>
              <th class="number-col">#</th>
              <th class="priority-col sortable" onclick="sortTable('${elementId}', 'name')">Priority ${getSortIndicator(elementId, 'name')}</th>
              <th class="status-col sortable" onclick="sortTable('${elementId}', 'status')">Status ${getSortIndicator(elementId, 'status')}</th>
              <th class="delivery-col sortable" onclick="sortTable('${elementId}', 'stageEta')">Stage delivery ${getSortIndicator(elementId, 'stageEta')}</th>
              <th class="prod-col sortable" onclick="sortTable('${elementId}', 'prodEta')">Production delivery ${getSortIndicator(elementId, 'prodEta')}</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function renderQuestionsAndStoppers(items) {
      const rows = items.map((item, index) => {
        const typeClass = item.type === "Stopper" || item.type === "Blocker"
          ? "stopped"
          : "awaiting-feedback";
        return `
          <tr>
            <td class="number-col" data-label="#">${index + 1}</td>
            <td class="question-type-cell" data-label="Type"><span class="badge ${typeClass}">${item.type}</span></td>
            <td class="priority-cell question-item-cell" data-label="Item">${item.item}</td>
            <td data-label="Status / Notes">${item.status}</td>
          </tr>
        `;
      }).join("");

      document.getElementById("questionsAndStoppersTable").innerHTML = `
        <table>
          <thead>
            <tr>
              <th class="number-col">#</th>
              <th class="status-col">Type</th>
              <th>Item</th>
              <th class="prod-col">Status / Notes</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }
  </script>
</body>
</html>
