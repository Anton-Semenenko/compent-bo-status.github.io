<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Board-Office Status</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <header class="header">
      <div>
        <h1>Board-Office Status</h1>
        <p id="lastUpdated"></p>
      </div>
      <div id="upcoming" class="upcoming"></div>
    </header>

    <section class="card">
      <h2>Portal</h2>
      <div id="portalTable"></div>
    </section>

    <section class="card">
      <h2>Hub</h2>
      <div id="hubTable"></div>
    </section>

    <section class="card">
      <h2>Questions & Stoppers</h2>
      <div id="questionsAndStoppersTable"></div>
    </section>
  </main>

  <script>
    fetch(`data.json?v=${Date.now()}`)
      .then(response => response.json())
      .then(data => {
        document.getElementById("lastUpdated").textContent =
          `Last updated: ${data.lastUpdated}`;

        renderUpcoming(data.upcomingDeliveries || []);
        renderTable("portalTable", data.portal || [], data);
        renderTable("hubTable", data.hub || [], data);
        renderQuestionsAndStoppers(data.questionsAndStoppers || []);
      })
      .catch(error => {
        console.error("Failed to load data.json", error);
      });

    function renderUpcoming(items) {
      document.getElementById("upcoming").innerHTML = items.map(item => `
        <div class="delivery">
          <span>${item.scope} upcoming delivery</span>
          <strong>${item.delivery}</strong>
        </div>
      `).join("");
    }

    function getStatusClass(status, data) {
      if (!status) return "todo";

      const statusConfig = data.statusConfig || {};
      return statusConfig[status] || "todo";
    }

    function renderTable(elementId, items, data) {
      const rows = items.map((item, index) => {
        const badgeClass = getStatusClass(item.status, data);

        return `
          <tr>
            <td class="number-col">${index + 1}</td>
            <td class="priority-cell">${item.name}</td>
            <td><span class="badge ${badgeClass}">${item.status}</span></td>
            <td class="delivery-cell">${item.stageEta}</td>
            <td class="delivery-cell">${item.prodEta}</td>
          </tr>
        `;
      }).join("");

      document.getElementById(elementId).innerHTML = `
        <table>
          <thead>
            <tr>
              <th class="number-col">#</th>
              <th class="priority-col">Priority</th>
              <th class="status-col">Status</th>
              <th class="delivery-col">Stage delivery</th>
              <th class="prod-col">Production delivery</th>
            </tr>
          </thead>
          <tbody>
            ${rows}
          </tbody>
        </table>
      `;
    }

    function renderQuestionsAndStoppers(items) {
      const rows = items.map((item, index) => {
        const typeClass = item.type === "Stopper" || item.type === "Blocker"
          ? "stopped"
          : "awaiting-feedback";

        return `
          <tr>
            <td class="number-col">${index + 1}</td>
            <td><span class="badge ${typeClass}">${item.type}</span></td>
            <td class="priority-cell">${item.item}</td>
            <td>${item.status}</td>
          </tr>
        `;
      }).join("");

      document.getElementById("questionsAndStoppersTable").innerHTML = `
        <table>
          <thead>
            <tr>
              <th class="number-col">#</th>
              <th class="status-col">Type</th>
              <th>Item</th>
              <th class="prod-col">Status / Notes</th>
            </tr>
          </thead>
          <tbody>
            ${rows}
          </tbody>
        </table>
      `;
    }
  </script>
</body>
</html>
