<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Board-Office Status</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <header class="header">
      <div>
        <h1>Board-Office Status</h1>
        <p id="lastUpdated"></p>
      </div>
      <div id="upcoming" class="upcoming"></div>
    </header>

    <section class="card collapsed-section" id="portalSection">
      <button class="section-toggle" onclick="toggleSection('portalSection')">
        <span id="portalTitle">Portal</span>
        <span class="toggle-action">Show</span>
      </button>
      <div class="section-content">
        <div id="portalTable"></div>
      </div>
    </section>

    <section class="card collapsed-section" id="hubSection">
      <button class="section-toggle" onclick="toggleSection('hubSection')">
        <span id="hubTitle">Hub</span>
        <span class="toggle-action">Show</span>
      </button>
      <div class="section-content">
        <div id="hubTable"></div>
      </div>
    </section>

    <section class="card collapsed-section" id="questionsSection">
      <button class="section-toggle" onclick="toggleSection('questionsSection')">
        <span id="questionsTitle">Questions & Stoppers</span>
        <span class="toggle-action">Show</span>
      </button>
      <div class="section-content">
        <div id="questionsAndStoppersTable"></div>
      </div>
    </section>
  </main>

  <script>
    fetch(`data.json?v=${Date.now()}`)
      .then(response => response.json())
      .then(data => {
        document.getElementById("lastUpdated").textContent =
          `Last updated: ${data.lastUpdated}`;

        renderUpcoming(data.upcomingDeliveries || []);

        updateSectionTitle("portalTitle", "Portal", data.portal || []);
        updateSectionTitle("hubTitle", "Hub", data.hub || []);
        updateQuestionsTitle(data.questionsAndStoppers || []);

        renderTable("portalTable", data.portal || [], data);
        renderTable("hubTable", data.hub || [], data);
        renderQuestionsAndStoppers(data.questionsAndStoppers || []);
      })
      .catch(error => {
        console.error("Failed to load data.json", error);
      });

    function renderUpcoming(items) {
      document.getElementById("upcoming").innerHTML = items.map(item => `
        <div class="delivery">
          <span>${item.scope} upcoming delivery</span>
          <strong>${item.delivery}</strong>
        </div>
      `).join("");
    }

    function updateSectionTitle(elementId, label, items) {
      document.getElementById(elementId).textContent = `${label} (${items.length})`;
    }

    function updateQuestionsTitle(items) {
      const stoppers = items.filter(i => i.type === "Stopper" || i.type === "Blocker").length;
      const questions = items.length - stoppers;

      document.getElementById("questionsTitle").textContent =
        `Questions & Stoppers (${items.length}) — ${stoppers} Stopper / ${questions} Question`;
    }

    function toggleSection(sectionId) {
      const section = document.getElementById(sectionId);
      section.classList.toggle("collapsed-section");

      const action = section.querySelector(".toggle-action");
      action.textContent = section.classList.contains("collapsed-section") ? "Show" : "Hide";
    }

    function getStatusClass(status, data) {
      if (!status) return "todo";
      const statusConfig = data.statusConfig || {};
      return statusConfig[status] || "todo";
    }

    function renderTable(elementId, items, data) {
      const rows = items.map((item, index) => {
        const badgeClass = getStatusClass(item.status, data);

        return `
          <tr>
            <td class="number-col" data-label="#">${index + 1}</td>
            <td class="priority-cell" data-label="Priority">${item.name}</td>
            <td data-label="Status"><span class="badge ${badgeClass}">${item.status}</span></td>
            <td class="delivery-cell" data-label="Stage delivery">${item.stageEta}</td>
            <td class="delivery-cell" data-label="Production delivery">${item.prodEta}</td>
          </tr>
        `;
      }).join("");

      document.getElementById(elementId).innerHTML = `
        <table>
          <thead>
            <tr>
              <th class="number-col">#</th>
              <th class="priority-col">Priority</th>
              <th class="status-col">Status</th>
              <th class="delivery-col">Stage delivery</th>
              <th class="prod-col">Production delivery</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function renderQuestionsAndStoppers(items) {
      const rows = items.map((item, index) => {
        const typeClass = item.type === "Stopper" || item.type === "Blocker"
          ? "stopped"
          : "awaiting-feedback";

        return `
          <tr>
            <td class="number-col" data-label="#">${index + 1}</td>
            <td data-label="Type"><span class="badge ${typeClass}">${item.type}</span></td>
            <td class="priority-cell" data-label="Item">${item.item}</td>
            <td data-label="Status / Notes">${item.status}</td>
          </tr>
        `;
      }).join("");

      document.getElementById("questionsAndStoppersTable").innerHTML = `
        <table>
          <thead>
            <tr>
              <th class="number-col">#</th>
              <th class="status-col">Type</th>
              <th>Item</th>
              <th class="prod-col">Status / Notes</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }
  </script>
</body>
</html>
